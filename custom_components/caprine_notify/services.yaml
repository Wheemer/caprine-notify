send_notification:
  fields:
    targets:
      required: false
      selector:
        object:
    title:
      required: false
      example: Doorbell
      selector:
        text:
    message:
      required: true
      example: Someone is at the door.
      selector:
        text:
          multiline: true
    url:
      required: false
      selector:
        text:
    icon:
      required: false
      selector:
        text:
    persistent:
      required: false
      default: false
      selector:
        boolean:
    timeout:
      required: false
      default: 7
      selector:
        number:
          min: 1
          max: 3600
          mode: box
          unit_of_measurement: seconds
    silent:
      required: false
      selector:
        boolean:
    id:
      required: false
      selector:
        text:
